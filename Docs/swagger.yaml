openapi: 3.0.0
info:
  title: Recouvra+ API
  version: 0.1.0
  description: API REST pour la gestion du recouvrement (utilisateurs, clients, factures, paiements, actions)
servers:
  - url: /api
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      tags: [Health]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /auth/register:
    post:
      summary: Register a user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  email:
                    type: string

  /auth/login:
    post:
      summary: Login and obtain JWT
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: JWT token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string

  /users:
    get:
      summary: List users (admin)
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Array of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  /clients:
    post:
      summary: Create a client
      tags: [Clients]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientInput'
      responses:
        '201':
          description: Client created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
    get:
      summary: List clients
      tags: [Clients]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Clients list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Client'

  /clients/{id}:
    get:
      summary: Get a client
      tags: [Clients]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Client
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '404':
          description: Not found
    put:
      summary: Update a client
      tags: [Clients]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientInput'
      responses:
        '200':
          description: Updated client
    delete:
      summary: Delete a client
      tags: [Clients]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted

  /invoices:
    post:
      summary: Create invoice
      tags: [Invoices]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceInput'
      responses:
        '201':
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
    get:
      summary: List invoices
      tags: [Invoices]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invoice'

  /invoices/{id}:
    get:
      summary: Get invoice
      tags: [Invoices]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '404':
          description: Not found
    put:
      summary: Update invoice
      tags: [Invoices]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceInput'
      responses:
        '200':
          description: Updated invoice
    delete:
      summary: Delete invoice
      tags: [Invoices]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Deleted

  /payments:
    post:
      summary: Record a payment
      tags: [Payments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentInput'
      responses:
        '201':
          description: Payment recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment:
                    $ref: '#/components/schemas/Payment'
                  invoice:
                    $ref: '#/components/schemas/Invoice'
    get:
      summary: List payments
      tags: [Payments]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Payments list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Payment'

  /actions:
    post:
      summary: Record an action (call, email, visit)
      tags: [Actions]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionInput'
      responses:
        '201':
          description: Action recorded
    get:
      summary: List actions
      tags: [Actions]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Actions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Action'

  /stats:
    get:
      summary: Simple statistics (totals)
      tags: [Stats]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Totals
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalInvoices:
                    type: integer
                  totalAmount:
                    type: number
                  totalPaid:
                    type: number
                  totalDue:
                    type: number
                  overdue:
                    type: integer

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
        isActive:
          type: boolean

    UserInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string

    Client:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        notes:
          type: string

    ClientInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        company:
          type: string
        notes:
          type: string

    Invoice:
      type: object
      properties:
        _id:
          type: string
        client:
          $ref: '#/components/schemas/Client'
        reference:
          type: string
        amount:
          type: number
        paid:
          type: number
        status:
          type: string
        dueDate:
          type: string
          format: date-time

    InvoiceInput:
      type: object
      required: [client, reference, amount]
      properties:
        client:
          type: string
        reference:
          type: string
        amount:
          type: number
        dueDate:
          type: string
          format: date-time

    Payment:
      type: object
      properties:
        _id:
          type: string
        invoice:
          $ref: '#/components/schemas/Invoice'
        amount:
          type: number
        method:
          type: string
        recordedBy:
          $ref: '#/components/schemas/User'

    PaymentInput:
      type: object
      required: [invoice, amount]
      properties:
        invoice:
          type: string
        amount:
          type: number
        method:
          type: string

    Action:
      type: object
      properties:
        _id:
          type: string
        invoice:
          $ref: '#/components/schemas/Invoice'
        type:
          type: string
        note:
          type: string
        performedBy:
          $ref: '#/components/schemas/User'

    ActionInput:
      type: object
      required: [invoice, type]
      properties:
        invoice:
          type: string
        type:
          type: string
        note:
          type: string

